services:
  # Backend API Service
  - type: web
    name: talentlens-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You will need to enter your API key in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Streamlit Service
  - type: web
    name: talentlens-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: API_URL
        sync: false # You will need to set this to your API URL (e.g. https://your-api-url.onrender.com/recommend)
